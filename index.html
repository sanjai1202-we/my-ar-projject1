<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>SDN AR</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; }
a-scene { position:fixed!important; top:0; left:0; width:100vw!important; height:100vh!important; }
#ui { position:fixed; bottom:24px; left:0; right:0; z-index:999; pointer-events:none; text-align:center; }
#status-box {
  display:inline-block; background:rgba(0,0,0,0.8);
  border:1.5px solid #4facfe; border-radius:30px;
  padding:12px 24px; color:#4facfe;
  font-family:Arial,sans-serif; font-size:0.9rem;
  text-transform:uppercase; letter-spacing:1px;
}
#loading-screen {
  position:fixed; inset:0; background:#000; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:Arial,sans-serif; color:#fff; gap:16px;
}
#loading-screen h2 { color:#4facfe; font-size:1.2rem; }
#loading-screen p { color:#888; font-size:0.85rem; }
#load-bar-wrap { width:200px; height:8px; background:#222; border-radius:4px; overflow:hidden; }
#load-bar { height:100%; width:0%; background:#4facfe; border-radius:4px; transition:width 0.3s; }
</style>
</head>
<body>

<div id="loading-screen">
  <h2>🔄 Loading AR...</h2>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <p>Please wait while camera starts</p>
</div>

<div id="ui">
  <div id="status-box">📷 Point camera at textbook page</div>
</div>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: ./targets.mind;
                uiScanning: no;
                uiLoading: no;
                filterMinCF: 0.001;
                filterBeta: 1000;
                warmupTolerance: 5;
                missTolerance: 10;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; alpha: true;"
  color-space="sRGB"
  embedded>

  <a-assets timeout="60000">
    <video id="vid"
      src="./video.mp4"
      preload="auto"
      loop muted playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Target 0 - first image compiled -->
  <a-entity mindar-image-target="targetIndex: 0" id="target0">
    <a-video src="#vid" width="1" height="0.5625" position="0 0 0.001"></a-video>
  </a-entity>

  <!-- Target 1 - second image compiled -->
  <a-entity mindar-image-target="targetIndex: 1" id="target1">
    <a-video src="#vid" width="1" height="0.5625" position="0 0 0.001"></a-video>
  </a-entity>

</a-scene>

<script>
const vid = document.getElementById('vid');
const target0 = document.getElementById('target0');
const target1 = document.getElementById('target1');
const statusBox = document.getElementById('status-box');
const loadScreen = document.getElementById('loading-screen');
const loadBar = document.getElementById('load-bar');
let loadPct = 0;

// Fake loading bar animation while MindAR starts
const fakeLoad = setInterval(() => {
  if (loadPct < 85) { loadPct += 5; loadBar.style.width = loadPct + '%'; }
}, 400);

// iOS/Android autoplay: must be muted first
vid.muted = true;

// Unlock video on first touch (browser policy)
let unlocked = false;
function unlock() {
  if (unlocked) return;
  unlocked = true;
  vid.play().then(() => { vid.pause(); vid.currentTime = 0; }).catch(()=>{});
}
document.addEventListener('touchstart', unlock, { once: true });
document.addEventListener('click', unlock, { once: true });

// Hide loading screen when AR is ready
document.getElementById('scene').addEventListener('arReady', () => {
  clearInterval(fakeLoad);
  loadBar.style.width = '100%';
  setTimeout(() => { loadScreen.style.display = 'none'; }, 400);
});

// Play video function
function playVideo() {
  statusBox.textContent = '▶️ Playing...';
  vid.currentTime = 0;
  vid.play().catch(() => {
    vid.muted = true;
    vid.play().catch(() => {});
  });
}

// Pause video function
function pauseVideo() {
  statusBox.textContent = '📷 Point camera at textbook page';
  vid.pause();
}

// Target 0 events
target0.addEventListener('targetFound', playVideo);
target0.addEventListener('targetLost', pauseVideo);

// Target 1 events
target1.addEventListener('targetFound', playVideo);
target1.addEventListener('targetLost', pauseVideo);

// Tap to unmute after browser unlock
document.addEventListener('click', () => {
  if (!vid.paused) vid.muted = false;
});
</script>
</body>
</html>
